services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.jacg.me
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.jacg.me/
      - GENERIC_TIMEZONE=America/Denver
    volumes:
      - n8n_data_vieja:/home/node/.n8n

volumes:
  n8n_data_vieja:
    external: true
    name: n8n-server_n8n_data
